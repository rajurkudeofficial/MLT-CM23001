<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PoseNet — Practical 6</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
</head>
<body>
  <div class="app-wrapper">

    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="10" r="4" fill="currentColor"/><path d="M8 28c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M4 18l4-4m20 0l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <span class="logo-text">PoseNet <em>Detector</em></span>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Live</a>
        <a href="Assignment/assi1/index.html" class="nav-link">Skeleton</a>
        <a href="Assignment/assi2/index.html" class="nav-link">Squats</a>
        <a href="Assignment/assi3/index.html" class="nav-link">Multi-Pose</a>
      </nav>
    </header>

    <main class="main-content">
      <div class="video-panel">
        <div class="video-container" id="videoContainer">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="canvas"></canvas>
          <div class="video-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>Loading PoseNet model…</p>
          </div>
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
        </div>
      </div>

      <aside class="control-panel">
        <div class="stat-card primary">
          <span class="stat-label">Status</span>
          <span class="stat-value" id="statusText">Initializing</span>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">FPS</span>
            <span class="stat-value mono" id="fpsDisplay">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Confidence</span>
            <span class="stat-value mono" id="confidenceDisplay">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Keypoints</span>
            <span class="stat-value mono" id="keypointsDisplay">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Pose Score</span>
            <span class="stat-value mono" id="poseScoreDisplay">—</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">Min Confidence</label>
          <div class="slider-row">
            <input type="range" id="minConfidence" min="0.1" max="0.9" step="0.05" value="0.5" />
            <span class="slider-val" id="confidenceVal">0.5</span>
          </div>
        </div>

        <div class="control-group">
          <button class="btn btn-primary" id="toggleBtn">Pause Detection</button>
          <button class="btn btn-outline" id="screenshotBtn">📸 Screenshot</button>
        </div>

        <div class="keypoints-list" id="keypointsList">
          <h3 class="list-title">Detected Keypoints</h3>
          <div class="kp-grid" id="kpGrid"></div>
        </div>
      </aside>
    </main>

  </div>
  <script src="model.js"></script>
</body>
</html>
